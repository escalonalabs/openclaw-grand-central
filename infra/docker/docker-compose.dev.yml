services:
  bridge:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.bridge
    working_dir: /workspace
    environment:
      BRIDGE_HOST: 0.0.0.0
      BRIDGE_PORT: ${BRIDGE_PORT:-3000}
      OPENCLAW_BRIDGE_NATIVE_PLUGIN_ENABLED: ${OPENCLAW_BRIDGE_NATIVE_PLUGIN_ENABLED:-1}
      OPENCLAW_BRIDGE_PLUGIN_TRANSPORT: ${OPENCLAW_BRIDGE_PLUGIN_TRANSPORT:-http-ingest}
      OPENCLAW_BRIDGE_TOKEN: ${OPENCLAW_BRIDGE_TOKEN:-}
      OPENCLAW_BRIDGE_SCOPES: ${OPENCLAW_BRIDGE_SCOPES:-telemetry:read,metrics:read,control:write}
      OPENCLAW_BRIDGE_ACTION_ALLOWLIST: ${OPENCLAW_BRIDGE_ACTION_ALLOWLIST:-restart-lane,resume-lane,pause-lane}
    ports:
      - "${BRIDGE_PORT:-3000}:${BRIDGE_PORT:-3000}"
    volumes:
      - ../..:/workspace
    init: true

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    working_dir: /workspace
    environment:
      WEB_PORT: ${WEB_PORT:-5173}
      VITE_EVENT_WS_URL: ws://localhost:${BRIDGE_PORT:-3000}/events
    command: >
      sh -c "npm install &&
      npm --workspace @openclaw/web run dev -- --host 0.0.0.0 --port $$WEB_PORT"
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    volumes:
      - ../..:/workspace
    depends_on:
      - bridge
    init: true
