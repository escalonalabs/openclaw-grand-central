name: Weekly maintenance

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    name: Repo health checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate markdown structure
        uses: DavidAnson/markdownlint-cli2-action@v22
